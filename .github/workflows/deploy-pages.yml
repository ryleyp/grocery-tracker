name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Write version metadata
        run: |
          node -e 'const fs = require("fs"); const lines = [["BUILD_SHA", process.env.GITHUB_SHA], ["BUILD_BRANCH", process.env.GITHUB_REF_NAME], ["BUILD_TIME", new Date().toISOString()]].map(([key, value]) => `export const ${key} = ${JSON.stringify(value || "")};`); fs.writeFileSync("js/version.js", lines.join("\n") + "\n");'
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
